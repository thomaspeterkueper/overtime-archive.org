name: One-off AVI Canonical Correction

on:
  push:
    branches: [master]
    paths:
      - tools/oneoff_avi_fix.py
      - .github/workflows/oneoff-avi-fix.yml

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Apply canonical AVI correction
        run: python tools/oneoff_avi_fix.py
      - name: Commit corrections and remove one-off tooling
        run: |
          git config user.name "ota-maintenance-bot"
          git config user.email "ota-maintenance-bot@users.noreply.github.com"
          git rm tools/oneoff_avi_fix.py .github/workflows/oneoff-avi-fix.yml
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m "Correct AVI acronym across OTA documents"
          git push
